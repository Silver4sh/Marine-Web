<div style="
    background: {bg_color};
    border: 1px solid {border_color};
    border-radius: 12px;
    padding: 12px 14px 44px 14px;
    margin-bottom: -38px;
    box-shadow: {box_shadow};
    transition: all 0.2s ease;
    animation: cardEntrance 0.3s ease forwards;
    position: relative;
    overflow: hidden;
    z-index: 0;
">
    <!-- Status color bar -->
    <div style="
        position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, {status_color}, transparent 80%);
        box-shadow: 0 0 8px {status_color}70;
    "></div>

    <!-- Vessel ID + Status Badge -->
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 8px;">
        <div style="
            font-weight: 800; color: #f1f5f9;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem; letter-spacing: 0.02em;
        ">{v_id}</div>
        <span style="
            background: {status_bg};
            color: {status_color};
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            border: 1px solid {status_color}45;
            letter-spacing: 0.05em;
            font-family: 'Outfit', sans-serif;
            white-space: nowrap;
        ">{status_text}</span>
    </div>

    <!-- Vessel Name + Speed row -->
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div style="
            font-size: 0.8rem; color: #94a3b8;
            font-family: 'Inter', sans-serif;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 60%;
        ">{v_name}</div>
        
        <div style="
            display: flex; align-items: center; gap: 5px;
            background: rgba(0,0,0,0.3);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.05);
        ">
            <span style="font-size: 0.75rem;">⚡</span>
            <span style="
                font-size: 0.8rem; color: #f1f5f9;
                font-family: 'Outfit', sans-serif;
                font-weight: 600;
            ">{v_speed} kn</span>
        </div>
    </div>
</div>
