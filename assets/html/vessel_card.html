<div style="
    background: {bg_color};
    border: 1px solid {border_color};
    border-radius: 14px;
    padding: 14px 16px 50px 16px;
    margin-bottom: -42px;
    box-shadow: {box_shadow};
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    z-index: 0;
    animation: cardEntrance 0.4s ease forwards;
">
    <!-- Status color bar -->
    <div style="
        position: absolute; top: 0; left: 0; right: 0; height: 2px;
        background: linear-gradient(90deg, {status_color}, transparent 80%);
        box-shadow: 0 0 8px {status_color}70;
    "></div>

    <!-- Vessel ID + Status Badge -->
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom: 10px;">
        <div style="overflow:hidden; max-width: 65%;">
            <div style="
                font-weight: 700; color: #f1f5f9;
                font-family: 'Outfit', sans-serif;
                font-size: 0.92rem; letter-spacing: 0.02em;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            ">{v_id}</div>
            <div style="
                font-size: 0.73rem; color: #94a3b8;
                font-family: 'Inter', sans-serif;
                margin-top: 2px;
                white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            ">{v_name}</div>
        </div>
        <span style="
            background: {status_bg};
            color: {status_color};
            padding: 3px 9px;
            border-radius: 50px;
            font-size: 0.65rem;
            font-weight: 700;
            border: 1px solid {status_color}45;
            letter-spacing: 0.06em;
            font-family: 'Outfit', sans-serif;
            white-space: nowrap;
        ">{status_text}</span>
    </div>

    <!-- Speed row -->
    <div style="
        display: flex; align-items: center; gap: 7px;
        background: rgba(0,0,0,0.28);
        padding: 7px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.05);
    ">
        <span style="font-size: 0.9rem;">⚡</span>
        <span style="
            font-size: 0.88rem; color: #f1f5f9;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        ">{v_speed} kn</span>
    </div>
</div>
