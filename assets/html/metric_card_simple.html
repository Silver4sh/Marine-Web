<div style="
    background: linear-gradient(145deg, rgba(18, 22, 36, 0.92) 0%, rgba(10, 12, 22, 0.85) 100%);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 20px 22px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
    transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease, border-color 0.25s ease;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    animation: cardEntrance 0.5s ease forwards;
">
    <!-- Gradient top bar -->
    <div style="
        position: absolute; top: 0; left: 0; right: 0; height: 2.5px;
        background: linear-gradient(90deg, {color}, rgba(245,158,11,0.7), {color});
        box-shadow: 0 0 10px {color}99;
        border-radius: 4px 4px 0 0;
    "></div>

    <!-- Scan line effect -->
    <div style="
        position: absolute; top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent 0%, {color}55 50%, transparent 100%);
        animation: scanLine 4s ease-in-out infinite;
        pointer-events: none;
    "></div>

    <!-- Label row -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px;">
        <span style="
            font-family: 'Outfit', sans-serif;
            font-size: 0.72rem; color: #94a3b8;
            font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
        ">{label}</span>
        <!-- Status dot -->
        <div style="
            width: 8px; height: 8px; border-radius: 50%;
            background: {color}; box-shadow: 0 0 8px {color};
            animation: dotBlink 1.8s ease-in-out infinite;
        "></div>
    </div>

    <!-- Value -->
    <div style="
        font-family: 'Outfit', sans-serif;
        font-size: 2.1rem; font-weight: 800;
        color: #f1f5f9;
        letter-spacing: -0.03em; line-height: 1.1;
        margin-bottom: 14px;
    ">{value}</div>

    <!-- Delta badge -->
    <div style="display: flex; align-items: center; gap: 6px;">
        <span style="
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem; font-weight: 600; color: {color};
            background: {color}18;
            padding: 4px 10px; border-radius: 99px;
            border: 1px solid {color}30;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        ">{delta}</span>
    </div>
</div>
