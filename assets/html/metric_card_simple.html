<div style="
    background: linear-gradient(145deg, rgba(18, 22, 36, 0.92) 0%, rgba(10, 12, 22, 0.85) 100%);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    animation: cardEntrance 0.3s ease forwards;
">
    <!-- Gradient top bar -->
    <div style="
        position: absolute; top: 0; left: 0; right: 0; height: 2.5px;
        background: linear-gradient(90deg, {color}, rgba(245,158,11,0.7), {color});
        box-shadow: 0 0 10px {color}99;
        border-radius: 4px 4px 0 0;
    "></div>

    <!-- Scan line effect -->
    <div style="
        position: absolute; top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent 0%, {color}55 50%, transparent 100%);
        animation: scanLine 4s ease-in-out infinite;
        pointer-events: none;
    "></div>

    <!-- Label row -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 6px; position: relative;">
        <div style="display:flex; align-items:center; gap:6px;">
            <span style="
                font-family: 'Outfit', sans-serif;
                font-size: 0.70rem; color: #94a3b8;
                font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
            ">{label}</span>

            <!-- Tooltip Hover Area -->
            <style>
                .metric-info-icon {
                    color: #64748b;
                    font-size: 0.8rem;
                    cursor: help;
                    transition: color 0.2s;
                }

                .metric-info-icon:hover {
                    color: #38bdf8;
                }

                .metric-tooltip {
                    visibility: hidden;
                    opacity: 0;
                    position: absolute;
                    top: 100%;
                    left: 0;
                    margin-top: 8px;
                    padding: 10px 14px;
                    background: rgba(15, 23, 42, 0.95);
                    border: 1px solid rgba(56, 189, 248, 0.3);
                    border-radius: 8px;
                    color: #cbd5e1;
                    font-family: 'Inter', sans-serif;
                    font-size: 0.75rem;
                    line-height: 1.4;
                    width: max-content;
                    max-width: 200px;
                    z-index: 50;
                    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
                    transform: translateY(-5px);
                    transition: all 0.2s ease;
                }

                .metric-info-wrapper {
                    position: relative;
                }

                .metric-info-wrapper:hover .metric-tooltip {
                    visibility: visible;
                    opacity: 1;
                    transform: translateY(0);
                }
            </style>

            <div class="metric-info-wrapper" style="display:{display_info};">
                <div class="metric-info-icon">ℹ️</div>
                <div class="metric-tooltip">
                    <strong style="color: #f8fafc; display: block; margin-bottom: 4px;">Info Metrik</strong>
                    {help_text}
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content Row -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px;">
        <!-- Value -->
        <div style="
            font-family: 'Outfit', sans-serif;
            font-size: 1.85rem; font-weight: 800;
            color: #f1f5f9;
            letter-spacing: -0.02em; line-height: 1;
        ">{value}</div>

        <!-- Sparkline Container (Right Side) -->
        <div style="flex-grow: 1; height: 26px; min-width: 50px; display: flex; align-items: flex-end; justify-content: flex-end;">
            {sparkline}
        </div>
    </div>

    <!-- Bottom Row: Delta badge & Status Dot -->
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <div style="display: flex; align-items: center;">
            <span style="
                font-family: 'Inter', sans-serif;
                font-size: 0.70rem; font-weight: 600; color: {color};
                background: {color}15;
                padding: 3px 8px; border-radius: 99px;
                border: 1px solid {color}30;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 100%;
            ">{delta}</span>
        </div>

        <!-- Status dot moved to bottom right -->
        <div style="
            width: 8px; height: 8px; border-radius: 50%;
            background: {color}; box-shadow: 0 0 8px {color};
            animation: dotBlink 1.8s ease-in-out infinite;
        "></div>
    </div>
</div>
